<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Davekorr Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .portfolio-card {
      display: block;
      overflow: hidden;
      border-radius: 12px;
    }

    .portfolio-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .portfolio-card:hover img {
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Photography Portfolio</h1>

    <div class="grid">

      <a href="rochester-winter.html" class="portfolio-card">
        <img src="images/roc-blizzard.jpg" alt="Rochester Blizzard">
      </a>

      <a href="rochester-winter.html" class="portfolio-card">
        <img src="images/roc-dock.jpg" alt="Rochester Dock">
      </a>

      <a href="rochester-winter.html" class="portfolio-card">
        <img src="images/roc-deer.jpg" alt="Rochester Deer">
      </a>

      <a href="rochester-winter.html" class="portfolio-card">
        <img src="images/roc-genesee-river.jpg" alt="Genesee River">
      </a>

      <a href="st-augustine.html" class="portfolio-card">
        <img src="images/sta-hero.jpg" alt="St Augustine Hero">
      </a>

      <a href="st-augustine.html" class="portfolio-card">
        <img src="images/sta-fountain.jpg" alt="St Augustine Fountain">
      </a>

      <a href="st-augustine.html" class="portfolio-card">
        <img src="images/sta-highway.jpg" alt="St Augustine Highway">
      </a>

      <a href="st-augustine.html" class="portfolio-card">
        <img src="images/sta-rocks.jpg" alt="St Augustine Rocks">
      </a>

    </div>
  </div>
</body>
</html>
