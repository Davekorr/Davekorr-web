<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dave Korr</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      color: white;
      overflow: hidden;
      background: black;
    }

    /* HERO */
    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
      background:
        linear-gradient(to top, rgba(0,0,0,0.75), rgba(0,0,0,0.2)),
        url('images/roc-hero.jpg') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: slowZoom 20s ease-in-out infinite alternate;
    }

    /* CONTENT */
    .content {
      text-align: center;
      animation: fadeUp 1.2s ease forwards;
      padding: 20px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .tagline {
      font-weight: 300;
      font-size: 0.95rem;
      opacity: 0.75;
      margin-bottom: 35px;
      letter-spacing: 1px;
    }

    /* NAV */
    .nav-links {
      display: flex;
      gap: 40px;
      justify-content: center;
      margin-bottom: 50px;
    }

    .nav-links a {
      text-decoration: none;
      color: white;
      font-size: 0.9rem;
      letter-spacing: 1.5px;
      position: relative;
      opacity: 0.75;
      transition: opacity 0.3s ease;
    }

    .nav-links a:hover {
      opacity: 1;
    }

    /* UNDERLINE ANIMATION */
    .nav-links a::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -5px;
      width: 0%;
      height: 1px;
      background: white;
      transition: width 0.3s ease;
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    /* SOCIALS */
    .socials {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      opacity: 0.6;
      letter-spacing: 1px;
    }

    .socials a {
      color: white;
      text-decoration: none;
      margin: 0 8px;
      transition: opacity 0.3s ease;
    }

    .socials a:hover {
      opacity: 1;
    }

    /* SCROLL BLUR EFFECT */
    body.scrolled .hero {
      filter: blur(4px) brightness(0.7);
      transition: filter 0.5s ease;
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slowZoom {
      from {
        background-size: 100%;
      }
      to {
        background-size: 110%;
      }
    }

    /* MOBILE OPTIMIZATION */
    @media (max-width: 768px) {

      .hero {
        animation: none; /* avoid jitter on mobile */
      }

      .nav-links {
        flex-direction: column;
        gap: 18px;
      }

      .tagline {
        font-size: 0.85rem;
      }

      .socials {
        bottom: 15px;
        font-size: 0.7rem;
      }
    }

  </style>
</head>

<body>

  <div class="hero">
    <div class="content">
      <h1>Dave Korr</h1>
      <div class="tagline">Light / Color / Place</div>

      <div class="nav-links">
        <a href="rochester-winter.html">Rochester</a>
        <a href="st-augustine.html">St. Augustine</a>
      </div>
    </div>

    <div class="socials">
      <a href="https://instagram.com/YOUR_HANDLE" target="_blank">Instagram</a> ·
      <a href="mailto:youremail@example.com">Email</a>
    </div>
  </div>

  <script>
    // Scroll blur trigger (future-proof if you add content below)
    window.addEventListener('scroll', () => {
      if (window.scrollY > 20) {
        document.body.classList.add('scrolled');
      } else {
        document.body.classList.remove('scrolled');
      }
    });
  </script>

</body>
</html>
